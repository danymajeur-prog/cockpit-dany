<html lang="fr">
<head>

<title>Dany — Espace de travail</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDyg7w87mTPgd8-7CWJvLkWV2m0Zsg6uY0",
    authDomain: "cockpit-dany.firebaseapp.com",
    databaseURL: "https://cockpit-dany-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "cockpit-dany",
    storageBucket: "cockpit-dany.firebasestorage.app",
    messagingSenderId: "374771705717",
    appId: "1:374771705717:web:58ba0604df6b1574cd953c"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  const ALLOWED_EMAILS = ['dany.majeur@gmail.com', 'd.magali@gmail.com'];

  function showLoginScreen() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }
  function hideLoginScreen() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  auth.onAuthStateChanged(function(user) {
    if (user && ALLOWED_EMAILS.includes(user.email)) {
      hideLoginScreen();
      load();
    } else if (user) {
      auth.signOut();
      document.getElementById('login-error').textContent = "Acces refuse. Ce compte n'est pas autorise.";
      showLoginScreen();
    } else {
      showLoginScreen();
    }
  });

  window.loginWithGoogle = function() {
    document.getElementById('login-error').textContent = '';
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(function(e) {
      document.getElementById('login-error').textContent = 'Erreur de connexion. Reessaie.';
    });
  };

  window.logout = function() { auth.signOut(); };
</script>
<style>
:root {
  --vert:      #7BA89A;
  --vert-p:    #A8C5BB;
  --vert-pale: #E8F2EF;
  --vert-xs:   #F2F7F5;
  --gris:      #8A9199;
  --gris-p:    #B8BEC5;
  --gris-pale: #EEF0F2;
  --beige:     #F5F2EE;
  --beige-p:   #EDE8E1;
  --noir:      #2C2C2C;
  --blanc:     #FAFAF8;
  --urgent:    #C0614A;
  --urgent-p:  #F5E8E5;
  --prio:      #B08A4A;
  --prio-p:    #F5EEE0;
  --import:    #7BA89A;
  --import-p:  #E8F2EF;
  --rose:      #C4897A;
  --rose-p:    #F5EDEB;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--beige);
  color: var(--noir);
  min-height: 100vh;
  font-size: 18px;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--blanc);
  border-bottom: 1px solid var(--beige-p);
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-left { display: flex; flex-direction: column; gap: 1px; }
.topbar-nom {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--noir);
}
.topbar-nom em { font-style: italic; color: var(--vert); }
.topbar-sub { font-size: 16px; color: var(--gris-p); letter-spacing: 2px; text-transform: uppercase; }

/* Horloge */
.horloge {
  text-align: right;
}
.horloge-h {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px;
  font-weight: 300;
  color: var(--noir);
  letter-spacing: 2px;
  line-height: 1;
}
.horloge-date {
  font-size: 14px;
  color: var(--gris);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ── ONGLETS ── */
.onglets-nav {
  background: var(--blanc);
  border-bottom: 1px solid var(--beige-p);
  padding: 0 32px;
  display: flex;
  gap: 0;
  position: sticky;
  top: 64px;
  z-index: 90;
}
.onglet-btn {
  padding: 12px 20px;
  border: none;
  background: transparent;
  color: var(--gris);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all .2s;
  font-family: 'DM Sans', sans-serif;
}
.onglet-btn:hover { color: var(--vert); }
.onglet-btn.active { color: var(--vert); border-bottom-color: var(--vert); }
.onglet-section { display: none; }
.onglet-section.active { display: block; }

/* ── MAIN ── */
.main { padding: 32px; max-width: 1200px; margin: 0 auto; }

.salut {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px;
  font-weight: 300;
  line-height: 1;
  margin-bottom: 4px;
  color: var(--noir);
}
.salut em { font-style: italic; color: var(--vert); }
.salut-sous {
  font-size: 16px;
  color: var(--gris);
  letter-spacing: 1px;
  margin-bottom: 32px;
  font-weight: 300;
}

/* ── GRID ── */
.grid-main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-bas { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* ── CARDS ── */
.card {
  background: var(--blanc);
  border-radius: 12px;
  border: 1px solid var(--beige-p);
  overflow: visible;
}
.card-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--gris-pale);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-titre {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 400;
  color: var(--noir);
  letter-spacing: .5px;
}
.card-badge {
  font-size: 15px;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 500;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.badge-vert { background: var(--vert-pale); color: var(--vert); }
.badge-gris { background: var(--gris-pale); color: var(--gris); }
.badge-urgent { background: var(--urgent-p); color: var(--urgent); }
.badge-rose { background: var(--rose-p); color: var(--rose); }
.card-body { padding: 20px 24px; }
.card { display: flex; flex-direction: column; }
.card-body { flex: 1; overflow: visible; }

/* ── CALENDRIER ── */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.cal-nav-titre {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--noir);
}
.cal-nav button {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--gris);
  font-size: 16px;
  padding: 4px 8px;
  border-radius: 4px;
  transition: color .15s;
}
.cal-nav button:hover { color: var(--vert); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow {
  text-align: center;
  font-size: 16px;
  font-weight: 500;
  color: var(--gris-p);
  letter-spacing: 1px;
  text-transform: uppercase;
  padding-bottom: 6px;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  border-radius: 50%;
  cursor: pointer;
  transition: all .15s;
  color: var(--noir);
  font-weight: 400;
  position: relative;
}
.cal-day:hover { background: var(--vert-pale); color: var(--vert); }
.cal-day.empty { cursor: default; }
.cal-day.empty:hover { background: transparent; }
.cal-day.today { background: var(--vert); color: #fff; font-weight: 500; }
.cal-day.today:hover { background: var(--vert); }
.cal-day.has-event::after {
  content: '';
  position: absolute;
  bottom: 3px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--rose);
}
.cal-day.today.has-event::after { background: #fff; }
.cal-day.we { color: var(--gris-p); }

/* Événements du calendrier */
.cal-events {
  margin-top: 14px;
  border-top: 1px solid var(--gris-pale);
  padding-top: 12px;
  max-height: 160px;
  overflow-y: auto;
}
.cal-event-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid var(--gris-pale);
  cursor: pointer;
}
.cal-event-item:last-child { border-bottom: none; }
.cal-event-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.cal-event-txt { font-size: 16px; color: var(--noir); flex: 1; line-height: 1.4; }
.cal-event-date { font-size: 16px; color: var(--gris-p); white-space: nowrap; }
.cal-event-del {
  background: none; border: none; cursor: pointer;
  color: var(--gris-p); font-size: 15px; padding: 0 2px;
  opacity: 0; transition: opacity .1s;
}
.cal-event-item:hover .cal-event-del { opacity: 1; }

/* Add event */
.add-event-row {
  display: flex;
  gap: 6px;
  margin-top: 12px;
}
.add-event-row input, .add-event-row select {
  padding: 8px 10px;
  border: 1px solid var(--gris-pale);
  border-radius: 8px;
  font-size: 16px;
  font-family: 'DM Sans', sans-serif;
  color: var(--noir);
  background: var(--blanc);
  outline: none;
}
.add-event-row input { flex: 1; }
.add-event-row input:focus, .add-event-row select:focus { border-color: var(--vert); }
.add-event-row button {
  padding: 8px 14px;
  background: var(--vert);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity .15s;
}
.add-event-row button:hover { opacity: .85; }

/* ── TÂCHES ── */
.task-groupe { margin-bottom: 16px; }
.task-groupe:last-child { margin-bottom: 0; }
.task-groupe-titre {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tg-urgent { color: var(--urgent); }
.tg-prio { color: var(--prio); }
.tg-import { color: var(--vert); }
.task-ligne {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid var(--gris-pale);
  cursor: pointer;
  transition: background .1s;
  border-radius: 4px;
  padding-left: 4px;
}
.task-ligne:last-child { border-bottom: none; }
.task-ligne:hover { background: var(--vert-xs); }
.task-ligne.done .task-texte { text-decoration: line-through; color: var(--gris-p); }
.task-check {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1.5px solid var(--gris-pale);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  background: #fff;
}
.task-check.done-u { background: var(--urgent); border-color: var(--urgent); }
.task-check.done-p { background: var(--prio); border-color: var(--prio); }
.task-check.done-i { background: var(--vert); border-color: var(--vert); }
.task-check.done-u::after,
.task-check.done-p::after,
.task-check.done-i::after {
  content: '';
  width: 7px; height: 4px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}
.task-texte { flex: 1; font-size: 18px; color: var(--noir); line-height: 1.4; }
.task-del {
  background: none; border: none; cursor: pointer;
  color: var(--gris-pale); font-size: 16px; padding: 0 3px;
  opacity: 0; transition: opacity .1s;
}
.task-ligne:hover .task-del { opacity: 1; }

/* Add task */
.add-task-zone {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--gris-pale);
  display: flex;
  gap: 6px;
  position: relative;
  z-index: 1;
}
.add-task-zone input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--gris-pale);
  border-radius: 8px;
  font-size: 16px;
  font-family: 'DM Sans', sans-serif;
  color: var(--noir);
  background: var(--blanc);
  outline: none;
}
.add-task-zone input:focus { border-color: var(--vert); }
.add-task-zone select {
  padding: 8px 10px;
  border: 1px solid var(--gris-pale);
  border-radius: 8px;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  color: var(--noir);
  background: var(--blanc);
  outline: none;
  cursor: pointer;
}
.add-task-zone button {
  padding: 8px 14px;
  background: var(--vert);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity .15s;
}
.add-task-zone button:hover { opacity: .85; }

/* ── SPECTACLES ── */
.spec-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--gris-pale);
}
.spec-item:last-child { border-bottom: none; }
.spec-date {
  font-size: 14px;
  color: var(--gris);
  min-width: 52px;
  flex-shrink: 0;
  padding-top: 2px;
  font-weight: 400;
}
.spec-info { flex: 1; }
.spec-titre { font-size: 18px; font-weight: 500; color: var(--noir); line-height: 1.3; }
.spec-sub { font-size: 14px; color: var(--gris); margin-top: 2px; }
.spec-badge {
  font-size: 13px;
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
  font-weight: 500;
}
.sb-soon { background: var(--urgent-p); color: var(--urgent); }
.sb-near { background: var(--prio-p); color: var(--prio); }
.sb-far  { background: var(--vert-pale); color: var(--vert); }

/* ── MAI ── */
.mois-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid var(--gris-pale);
  cursor: pointer;
  transition: background .1s;
  border-radius: 4px;
  padding-left: 4px;
}
.mois-item:last-child { border-bottom: none; }
.mois-item:hover { background: var(--vert-xs); }
.mois-item.done .mois-texte { text-decoration: line-through; color: var(--gris-p); }
.mois-check {
  width: 24px; height: 24px;
  border-radius: 4px;
  border: 1.5px solid var(--gris-pale);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: #fff;
  transition: all .15s;
}
.mois-check.done { background: var(--vert); border-color: var(--vert); }
.mois-check.done::after {
  content: '';
  width: 7px; height: 4px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}
.mois-texte { flex: 1; font-size: 18px; color: var(--noir); }
.mois-del {
  background: none; border: none; cursor: pointer;
  color: var(--gris-pale); font-size: 16px; padding: 0 3px;
  opacity: 0; transition: opacity .1s;
}
.mois-item:hover .mois-del { opacity: 1; }
.add-mois-row {
  display: flex; gap: 6px; margin-top: 12px;
  padding-top: 12px; border-top: 1px solid var(--gris-pale);
}
.add-mois-row input {
  flex: 1; padding: 8px 12px;
  border: 1px solid var(--gris-pale); border-radius: 8px;
  font-size: 16px; font-family: 'DM Sans', sans-serif;
  color: var(--noir); background: var(--blanc); outline: none;
}
.add-mois-row input:focus { border-color: var(--vert); }
.add-mois-row button {
  padding: 8px 14px; background: var(--vert); color: #fff;
  border: none; border-radius: 8px; font-size: 16px;
  font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: opacity .15s;
}
.add-mois-row button:hover { opacity: .85; }

/* ── NOTE ── */
.note-zone {
  width: 100%; background: transparent;
  border: none; outline: none;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--noir);
  resize: none;
  line-height: 1.7;
  min-height: 100px;
}
.note-zone::placeholder { color: var(--gris-p); }

/* ── PLANNING (onglet) ── */
#planning-root { min-height: 60vh; }

/* ── TO-DO AUJOURD'HUI ── */
.today-todo-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--gris-pale);cursor:pointer;transition:background .1s;border-radius:4px}
.today-todo-item:last-child{border-bottom:none}
.today-todo-item:hover{background:var(--vert-xs)}
.today-todo-item.done .today-todo-txt{text-decoration:line-through;color:var(--gris-p)}
.today-todo-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--gris-pale);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .15s}
.today-todo-check.done{background:var(--vert);border-color:var(--vert)}
.today-todo-check.done::after{content:'';width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.today-todo-txt{flex:1;font-size:17px;color:var(--noir);line-height:1.4}
.today-todo-del{background:none;border:none;cursor:pointer;color:var(--gris-pale);font-size:14px;padding:0 3px;opacity:0;transition:opacity .1s}
.today-todo-item:hover .today-todo-del{opacity:1}
.today-archive-item{display:flex;align-items:center;gap:8px;padding:5px 4px;font-size:14px;color:var(--gris)}
.today-archive-item span{flex:1;text-decoration:line-through}
.today-archive-item time{font-size:12px;color:var(--gris-p)}

.footer {
  text-align: center; font-size: 15px; color: var(--gris-p);
  padding: 32px; letter-spacing: 2px; text-transform: uppercase;
}

@media(max-width:900px) {
  .grid-main { grid-template-columns: 1fr 1fr; }
  .grid-bas { grid-template-columns: 1fr; }
}
@media(max-width:600px) {
  .grid-main { grid-template-columns: 1fr; }
  .main { padding: 16px; }
  .topbar { padding: 0 16px; }
}
</style>
</head>
<body>

<!-- ÉCRAN DE CONNEXION -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:var(--beige);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:24px;">
  <div style="font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--noir);">Espace <em style="color:var(--vert)">Dany</em></div>
  <div style="font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--gris);">Théâtre du Bocal · Saison 2025–2026</div>
  <button onclick="loginWithGoogle()" style="display:flex;align-items:center;gap:12px;background:white;border:1.5px solid var(--beige-p);border-radius:12px;padding:14px 28px;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--noir);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Se connecter avec Google
  </button>
  <div id="login-error" style="font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--urgent);"></div>
</div>

<!-- APPLICATION -->
<div id="app" style="display:none;">

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-nom">Espace <em>Dany</em></div>
    <div class="topbar-sub">Théâtre du Bocal · Saison 2025–2026</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <button onclick="logout()" style="font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--gris);background:none;border:1px solid var(--beige-p);border-radius:8px;padding:4px 12px;cursor:pointer;">Déconnexion</button>
    <div class="horloge">
      <div class="horloge-h" id="horloge-h">--:--</div>
      <div class="horloge-date" id="horloge-date"></div>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script>
// ══════════════════════════════════════════
// PLANNING BASE (Bocal 2026)
// ══════════════════════════════════════════
var PLANNING_BASE = [
  {date:"2026-04-01",categorie:"cours",titre:"Cours Pitchoun · Pré-ado · Seb",horaire:"10h · 14h · 18h30"},
  {date:"2026-04-02",categorie:"cours",titre:"Cours Ralf",horaire:"19h"},
  {date:"2026-04-03",categorie:"repetition",titre:"Répétition Marlène",horaire:"10h30–14h30"},
  {date:"2026-04-15",categorie:"technique",titre:"Technique Jerome / Mag / Marlène",horaire:"10h–17h"},
  {date:"2026-04-18",categorie:"spectacle",titre:"BATM — Spectacle",horaire:"18h"},
  {date:"2026-04-19",categorie:"spectacle",titre:"Tirez C'est Joué !",horaire:"18h"},
  {date:"2026-04-24",categorie:"spectacle",titre:"Jules Renard",horaire:"20h"},
  {date:"2026-04-25",categorie:"spectacle",titre:"Smith & Wesson",horaire:"18h"},
  {date:"2026-05-02",categorie:"spectacle",titre:"Cabaret d'Impro",horaire:"19h"},
  {date:"2026-05-13",categorie:"spectacle",titre:"Spectacle Ralf",horaire:"—"},
  {date:"2026-05-14",categorie:"spectacle",titre:"Spectacle Ralf",horaire:"—"},
  {date:"2026-05-20",categorie:"spectacle",titre:"Espèce Menacée",horaire:"20h"},
  {date:"2026-05-21",categorie:"spectacle",titre:"Espèce Menacée",horaire:"20h"},
  {date:"2026-05-24",categorie:"spectacle",titre:"Jules Renard",horaire:"20h"},
  {date:"2026-06-05",categorie:"spectacle",titre:"Far Far America",horaire:"20h"},
  {date:"2026-06-06",categorie:"spectacle",titre:"Far Far America",horaire:"18h"},
  {date:"2026-06-07",categorie:"spectacle",titre:"Far Far America",horaire:"15h"},
  {date:"2026-06-12",categorie:"repetition",titre:"Général spectacle Ralf",horaire:"—"},
  {date:"2026-06-13",categorie:"spectacle",titre:"Spectacle Ralf",horaire:"—"},
  {date:"2026-06-14",categorie:"spectacle",titre:"Spectacle Ralf",horaire:"—"},
  {date:"2026-06-20",categorie:"spectacle",titre:"Espèce Menacée",horaire:"20h"},
  {date:"2026-06-21",categorie:"spectacle",titre:"Espèce Menacée",horaire:"20h"},
  {date:"2026-06-27",categorie:"spectacle",titre:"Espèce Menacée",horaire:"20h"},
  {date:"2026-06-28",categorie:"spectacle",titre:"Espèce Menacée",horaire:"20h"},
];

var MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var JOURS_L = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
var JOURS_C = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
var today = new Date();

// ══════════════════════════════════════════
// STOCKAGE — Firebase Realtime Database
// ══════════════════════════════════════════
var DATA = {
  tasks: [
    {id:1, txt:"Appeler le médecin", cat:"urgent", done:false},
    {id:2, txt:"Envoyer le script à la compagnie", cat:"prio", done:false},
    {id:3, txt:"Finir l'adaptation du chapitre 3", cat:"prio", done:false},
    {id:4, txt:"Commander fournitures illustration", cat:"import", done:false},
  ],
  mai: [
    {id:1, txt:"Réservations costumes", done:false},
    {id:2, txt:"RDV avec Magali — Bocal", done:false},
    {id:3, txt:"Envoyer bilan à la SACD", done:false},
  ],
  events: [],
};

var _fbLoaded = false;

function save() {
  db.ref('cockpit').set({
    tasks: DATA.tasks,
    mai: DATA.mai,
    events: DATA.events
  });
}

function load() {
  db.ref('cockpit').once('value', function(snapshot) {
    var d = snapshot.val();
    if (d) {
      if (d.tasks) DATA.tasks = d.tasks;
      if (d.mai)   DATA.mai   = d.mai;
      if (d.events) DATA.events = d.events;
    }
    _fbLoaded = true;
    // Petit délai pour laisser le DOM se stabiliser
    setTimeout(function() {
      renderCal();
      renderTasks();
      renderMai();
      renderSpectacles();
      renderToday();
      renderTodayTodo();
    }, 50);
  });
}

// ══════════════════════════════════════════
// HORLOGE
// ══════════════════════════════════════════
function tickHorloge() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('horloge-h').textContent = h + ' : ' + m;
}
setInterval(tickHorloge, 1000);
tickHorloge();

// Date + salut
var h = today.getHours();
var salutTxt = h < 12 ? 'Bonjour' : h < 18 ? 'Bon après-midi' : 'Bonsoir';
document.getElementById('salut').innerHTML = salutTxt + ' <em>Dany</em>';
document.getElementById('salut-sous').textContent = JOURS_L[today.getDay()] + ' ' + today.getDate() + ' ' + MOIS[today.getMonth()] + ' ' + today.getFullYear();
document.getElementById('horloge-date').textContent = JOURS_C[today.getDay()] + ' ' + today.getDate() + ' ' + MOIS[today.getMonth()].substring(0,4) + '.';

// ══════════════════════════════════════════
// CALENDRIER
// ══════════════════════════════════════════
var calMois = today.getMonth();
var calAnnee = today.getFullYear();

function renderCal() {
  document.getElementById('cal-titre').textContent = MOIS[calMois] + ' ' + calAnnee;
  var grid = document.getElementById('cal-grid');
  var jours = ['Lu','Ma','Me','Je','Ve','Sa','Di'];
  var html = jours.map(j => '<div class="cal-dow">'+j+'</div>').join('');
  var first = new Date(calAnnee, calMois, 1).getDay();
  var offset = first === 0 ? 6 : first - 1;
  var nbJours = new Date(calAnnee, calMois+1, 0).getDate();
  for (var i=0; i<offset; i++) html += '<div class="cal-day empty"></div>';
  for (var j=1; j<=nbJours; j++) {
    var isoDate = calAnnee + '-' + String(calMois+1).padStart(2,'0') + '-' + String(j).padStart(2,'0');
    var isToday = today.getFullYear()===calAnnee && today.getMonth()===calMois && today.getDate()===j;
    var dow = new Date(calAnnee, calMois, j).getDay();
    var isWE = dow===0||dow===6;
    var hasEv = DATA.events.some(e=>e.date===isoDate) || PLANNING_BASE.some(e=>e.date===isoDate&&e.categorie==='repetition');
    var cls = 'cal-day' + (isToday?' today':'') + (isWE?' we':'') + (hasEv?' has-event':'');
    html += '<div class="'+cls+'" onclick="calDayClick(\''+isoDate+'\')">'+j+'</div>';
  }
  grid.innerHTML = html;

  // Événements du mois
  var evsMois = DATA.events.filter(e => {
    var d = new Date(e.date);
    return d.getMonth()===calMois && d.getFullYear()===calAnnee;
  }).sort((a,b) => a.date.localeCompare(b.date));
  // + répétitions Bocal ce mois
  var reps = PLANNING_BASE.filter(e => {
    var d = new Date(e.date);
    return d.getMonth()===calMois && d.getFullYear()===calAnnee && e.categorie==='repetition';
  });
  var total = evsMois.length + reps.length;
  document.getElementById('badge-cal').textContent = total > 0 ? total + ' événement' + (total>1?'s':'') : 'Rien ce mois';

  var evsHtml = '';
  reps.forEach(r => {
    var d = new Date(r.date);
    evsHtml += '<div class="cal-event-item">'
      + '<div class="cal-event-dot" style="background:var(--vert)"></div>'
      + '<div class="cal-event-txt">🎭 ' + r.titre + (r.horaire&&r.horaire!=='—'?' · '+r.horaire:'') + '</div>'
      + '<div class="cal-event-date">' + d.getDate() + ' ' + MOIS[d.getMonth()].substring(0,3) + '.</div>'
      + '</div>';
  });
  evsMois.forEach(e => {
    var d = new Date(e.date);
    evsHtml += '<div class="cal-event-item">'
      + '<div class="cal-event-dot" style="background:var(--rose)"></div>'
      + '<div class="cal-event-txt">' + e.txt + '</div>'
      + '<div class="cal-event-date">' + d.getDate() + ' ' + MOIS[d.getMonth()].substring(0,3) + '.</div>'
      + '<button class="cal-event-del" onclick="deleteEvent(\''+e.id+'\')">✕</button>'
      + '</div>';
  });
  document.getElementById('cal-events').innerHTML = evsHtml || '<div style="color:var(--gris-p);font-size:15px;padding:8px 0;font-style:italic">Aucun événement ce mois</div>';

  // Pré-remplir la date
  var todayIso = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  document.getElementById('new-event-date').value = todayIso;
}

function calPrev() { calMois--; if(calMois<0){calMois=11;calAnnee--;} renderCal(); }
function calNext() { calMois++; if(calMois>11){calMois=0;calAnnee++;} renderCal(); }
function calDayClick(iso) {
  document.getElementById('new-event-date').value = iso;
  document.getElementById('new-event-txt').focus();
}

function addEvent() {
  var txt = document.getElementById('new-event-txt').value.trim();
  var date = document.getElementById('new-event-date').value;
  if (!txt || !date) return;
  var id = 'ev-' + Date.now();
  DATA.events.push({id, txt, date});
  document.getElementById('new-event-txt').value = '';
  save(); renderCal();
}

function deleteEvent(id) {
  DATA.events = DATA.events.filter(e => e.id !== id);
  save(); renderCal();
}

// ══════════════════════════════════════════
// TÂCHES
// ══════════════════════════════════════════
var CAT_LABELS = {urgent:'Urgent',prio:'Prioritaire',import:'Important'};
var CAT_ORDER = ['urgent','prio','import'];

function renderTasks() {
  var container = document.getElementById('tasks-container');
  var total = DATA.tasks.length;
  var done = DATA.tasks.filter(t=>t.done).length;
  document.getElementById('badge-tasks').textContent = (total-done) + ' restante' + (total-done!==1?'s':'');

  var html = '';
  CAT_ORDER.forEach(cat => {
    var items = DATA.tasks.filter(t => t.cat===cat);
    if (items.length===0) return;
    html += '<div class="task-groupe">';
    html += '<div class="task-groupe-titre tg-'+cat+'">'+CAT_LABELS[cat]+'</div>';
    items.forEach(t => {
      var checkCls = t.done ? 'task-check done-'+cat : 'task-check';
      html += '<div class="task-ligne'+(t.done?' done':'')+'" onclick="toggleTask('+t.id+')">'
        + '<div class="'+checkCls+'"></div>'
        + '<div class="task-texte">'+t.txt+'</div>'
        + '<button class="task-del" onclick="event.stopPropagation();deleteTask('+t.id+')">✕</button>'
        + '</div>';
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function toggleTask(id) {
  DATA.tasks.forEach(t => { if(t.id===id) t.done = !t.done; });
  save(); renderTasks();
}
function deleteTask(id) {
  DATA.tasks = DATA.tasks.filter(t => t.id!==id);
  save(); renderTasks();
}
function addTask() {
  var txt = document.getElementById('new-task-txt').value.trim();
  var cat = document.getElementById('new-task-cat').value;
  if (!txt) return;
  var id = Math.max(0,...DATA.tasks.map(t=>t.id)) + 1;
  DATA.tasks.push({id, txt, cat, done:false});
  document.getElementById('new-task-txt').value = '';
  save(); renderTasks();
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('new-task-txt').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
  document.getElementById('new-event-txt').addEventListener('keydown', e => { if(e.key==='Enter') addEvent(); });
  document.getElementById('new-mai-txt').addEventListener('keydown', e => { if(e.key==='Enter') addMai(); });
  var ntt=document.getElementById('new-today-txt'); if(ntt) ntt.addEventListener('keydown', e => { if(e.key==='Enter') addTodayTodo(); });
  document.getElementById('new-today-txt').addEventListener('keydown', e => { if(e.key==='Enter') addTodayTodo(); });
});

// ══════════════════════════════════════════
// MAI
// ══════════════════════════════════════════
function renderMai() {
  var done = DATA.mai.filter(m=>m.done).length;
  var total = DATA.mai.length;
  document.getElementById('badge-mai').textContent = (total-done) + ' restante' + (total-done!==1?'s':'');
  document.getElementById('mai-container').innerHTML = DATA.mai.map(m =>
    '<div class="mois-item'+(m.done?' done':'')+'" onclick="toggleMai('+m.id+')">'
    + '<div class="mois-check'+(m.done?' done':'')+'"></div>'
    + '<div class="mois-texte">'+m.txt+'</div>'
    + '<button class="mois-del" onclick="event.stopPropagation();deleteMai('+m.id+')">✕</button>'
    + '</div>'
  ).join('');
}
function toggleMai(id) { DATA.mai.forEach(m=>{if(m.id===id)m.done=!m.done;}); save(); renderMai(); }
function deleteMai(id) { DATA.mai=DATA.mai.filter(m=>m.id!==id); save(); renderMai(); }
function addMai() {
  var txt = document.getElementById('new-mai-txt').value.trim();
  if (!txt) return;
  var id = Math.max(0,...DATA.mai.map(m=>m.id))+1;
  DATA.mai.push({id,txt,done:false});
  document.getElementById('new-mai-txt').value='';
  save(); renderMai();
}

// ══════════════════════════════════════════
// SPECTACLES À VENIR
// ══════════════════════════════════════════
function renderSpectacles() {
  var nowMs = new Date(today.getFullYear(),today.getMonth(),today.getDate()).getTime();
  var specs = [];
  PLANNING_BASE.filter(e=>e.categorie==='spectacle').forEach(e => {
    var d = new Date(e.date);
    var diff = Math.round((d.getTime()-nowMs)/86400000);
    if (diff < 0 || diff > 90) return;
    var nom = e.titre;
    var ex = specs.find(s=>s.nom===nom && Math.abs(s.dernierJ - d.getDate())<=2 && s.mois===d.getMonth());
    if (ex) { ex.dernierJ=d.getDate(); ex.nb++; }
    else specs.push({nom,mois:d.getMonth(),premierJ:d.getDate(),dernierJ:d.getDate(),nb:1,diff});
  });
  specs.sort((a,b)=>a.diff-b.diff);
  document.getElementById('spectacles-container').innerHTML = specs.slice(0,5).map(s => {
    var dateLabel = s.premierJ===s.dernierJ
      ? s.premierJ+' '+MOIS[s.mois].substring(0,3)+'.'
      : s.premierJ+'–'+s.dernierJ+' '+MOIS[s.mois].substring(0,3)+'.';
    var bCls = s.diff<=3?'sb-soon':s.diff<=14?'sb-near':'sb-far';
    var bTxt = s.diff===0?'Aujourd\'hui':s.diff===1?'Demain':'J-'+s.diff;
    return '<div class="spec-item">'
      +'<div class="spec-date">'+dateLabel+'</div>'
      +'<div class="spec-info"><div class="spec-titre">'+s.nom+'</div>'+(s.nb>1?'<div class="spec-sub">'+s.nb+' dates</div>':'')+'</div>'
      +'<span class="spec-badge '+bCls+'">'+bTxt+'</span>'
      +'</div>';
  }).join('') || '<div style="color:var(--gris-p);font-size:17px;font-style:italic">Aucun spectacle à venir</div>';
}

// ══════════════════════════════════════════
// AUJOURD'HUI (planning Bocal)
// ══════════════════════════════════════════
// ══════ TO-DO AUJOURD'HUI ══════
function todoTodayKey() {
  return 'todoJour/' + today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
}
function loadTodayTodo() {
  // Retourne les données en mémoire (déjà chargées via listener)
  return window._todayTodoData || {actives:[], archives:[]};
}
function saveTodayTodo(data) {
  window._todayTodoData = data;
  db.ref(todoTodayKey()).set(data);
}

// Écoute en temps réel le todo du jour
db.ref(todoTodayKey()).on('value', function(snap) {
  var d = snap.val();
  window._todayTodoData = d || {actives:[], archives:[]};
  renderTodayTodo();
});
function renderTodayTodo() {
  var data = loadTodayTodo();
  var el = document.getElementById('today-todo');
  var sep = document.getElementById('today-sep');
  if (sep) sep.style.display = data.actives.length > 0 ? 'block' : 'none';
  if (!el) return;
  if (data.actives.length === 0) {
    el.innerHTML = '<div style="color:var(--gris);font-size:16px;font-style:italic;padding:4px 0">Rien à faire pour l\'instant 🌿</div>';
  } else {
    el.innerHTML = data.actives.map(function(t) {
      return '<div class="today-todo-item' + (t.done ? ' done' : '') + '" onclick="toggleTodayTodo(' + t.id + ')">'
        + '<div class="today-todo-check' + (t.done ? ' done' : '') + '"></div>'
        + '<div class="today-todo-txt">' + t.txt + '</div>'
        + '<button class="today-todo-del" onclick="event.stopPropagation();deleteTodayTodo(' + t.id + ')">✕</button>'
        + '</div>';
    }).join('');
  }
  var wrap = document.getElementById('today-archive-wrap');
  var archEl = document.getElementById('today-archive');
  var label = document.getElementById('today-archive-label');
  if (!wrap) return;
  if (data.archives.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  label.textContent = data.archives.length + ' tâche' + (data.archives.length > 1 ? 's' : '') + ' faite' + (data.archives.length > 1 ? 's' : '');
  archEl.innerHTML = data.archives.map(function(t) {
    return '<div class="today-archive-item">✓ <span>' + t.txt + '</span><time>' + t.doneAt + '</time></div>';
  }).join('');
}
function addTodayTodo() {
  var txt = document.getElementById('new-today-txt').value.trim();
  if (!txt) return;
  var data = loadTodayTodo();
  data.actives.push({id: Date.now(), txt: txt, done: false});
  saveTodayTodo(data);
  document.getElementById('new-today-txt').value = '';
  renderTodayTodo();
}
function toggleTodayTodo(id) {
  var data = loadTodayTodo();
  var t = data.actives.find(function(x) { return x.id === id; });
  if (!t) return;
  if (!t.done) {
    t.done = true;
    saveTodayTodo(data);
    renderTodayTodo();
    setTimeout(function() {
      var d2 = loadTodayTodo();
      var idx = d2.actives.findIndex(function(x) { return x.id === id; });
      if (idx === -1) return;
      var tache = d2.actives.splice(idx, 1)[0];
      var n = new Date();
      tache.doneAt = String(n.getHours()).padStart(2,'0') + 'h' + String(n.getMinutes()).padStart(2,'0');
      d2.archives.unshift(tache);
      saveTodayTodo(d2);
      renderTodayTodo();
    }, 700);
  } else {
    t.done = false;
    saveTodayTodo(data);
    renderTodayTodo();
  }
}
function deleteTodayTodo(id) {
  var data = loadTodayTodo();
  data.actives = data.actives.filter(function(t) { return t.id !== id; });
  saveTodayTodo(data);
  renderTodayTodo();
}
function toggleTodayArchive() {
  var el = document.getElementById('today-archive');
  var label = document.getElementById('today-archive-label');
  var data = loadTodayTodo();
  if (el.style.display === 'none') {
    el.style.display = 'block';
    label.textContent = '▲ Masquer';
  } else {
    el.style.display = 'none';
    label.textContent = data.archives.length + ' tâche' + (data.archives.length > 1 ? 's' : '') + ' faite' + (data.archives.length > 1 ? 's' : '');
  }
}
function renderToday() {
  var JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  var MC = ['Jan.','Fév.','Mar.','Avr.','Mai','Juin','Juil.','Août','Sep.','Oct.','Nov.','Déc.'];
  var iso = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  var titre = document.getElementById('titre-today');
  if (titre) titre.textContent = JOURS[today.getDay()] + ' ' + today.getDate() + ' ' + MC[today.getMonth()];
  var evs = PLANNING_BASE.filter(function(e) { return e.date === iso && e.categorie !== 'cours' && e.categorie !== 'ferme'; });
  var badge = document.getElementById('badge-today');
  var body = document.getElementById('today-body');
  if (evs.length === 0) {
    badge.textContent = 'Libre 🌿';
    badge.className = 'card-badge badge-gris';
    body.innerHTML = '';
  } else {
    var hasSpec = evs.some(function(e) { return e.categorie === 'spectacle'; });
    badge.textContent = hasSpec ? '🎭 Spectacle' : '📋 Bocal';
    badge.className = 'card-badge ' + (hasSpec ? 'badge-rose' : 'badge-vert');
    body.innerHTML = evs.map(function(e) {
      var icon = e.categorie === 'spectacle' ? '🎭' : e.categorie === 'repetition' ? '🔄' : '🔧';
      return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--gris-pale)">'
        + '<span style="font-size:20px">' + icon + '</span>'
        + '<span style="font-size:17px;color:var(--noir)">' + e.titre + '</span>'
        + (e.horaire && e.horaire !== '—' ? '<span style="font-size:14px;color:var(--gris-p)"> · ' + e.horaire + '</span>' : '')
        + '</div>';
    }).join('');
  }
  renderTodayTodo();
}

db.ref('note').once('value', function(snap) {

noteEl.addEventListener('input', function() {

});

function switchOnglet(nom, btn) {
  document.querySelectorAll('.onglet-section').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.onglet-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('onglet-'+nom).classList.add('active');
  btn.classList.add('active');
  if (nom==='planning' && window._mountPlanningDany) window._mountPlanningDany();
}

function parseDate(str) { const [y,m,d]=str.split("-").map(Number); return new Date(y,m-1,d); }
function getDaysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function getMondayOffset(y,m) { const fd=new Date(y,m,1).getDay(); return fd===0?6:fd-1; }
function isSameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function uid() { return "u-"+Date.now()+"-"+Math.random().toString(36).slice(2,7); }

const EMPTY_FORM = { date:"", categorie:"spectacle", titre:"", responsable:"", horaire:"" };
const STORAGE_KEY = "bocal-custom-events-2026"; // gardé pour migration éventuelle

// ── Composant champ de formulaire ──
function Field({ label, children }) {
  return (
    <div>
      <label style={{ fontSize:11, color:"#555", fontWeight:600, display:"block", marginBottom:4 }}>{label}</label>
      {children}
    </div>
  );
}

const inputStyle = { width:"100%", padding:"8px 10px", border:"1px solid #D1D5DB", borderRadius:3, fontSize:13, boxSizing:"border-box", fontFamily:"inherit" };

function App() {
  const today = new Date(2026, 3, 22);

  const [customEvents,  setCustomEvents]  = useState([]);
  const [fbReady,       setFbReady]       = useState(false);
  const [view,          setView]          = useState("panorama");
  const [filterCat,     setFilterCat]     = useState("all");

  const [showForm,      setShowForm]      = useState(false);
  const [form,          setForm]          = useState(EMPTY_FORM);
  const [formError,     setFormError]     = useState("");

  const [editingId,     setEditingId]     = useState(null);
  const [editForm,      setEditForm]      = useState(EMPTY_FORM);
  const [editError,     setEditError]     = useState("");

  // Firebase — chargement initial + écoute en temps réel
  useEffect(() => {
    const ref = db.ref('customEvents');
    ref.on('value', function(snap) {
      const val = snap.val();
      setCustomEvents(val ? Object.values(val) : []);
      setFbReady(true);
    });
    return () => ref.off();
  }, []);

  const allEvents = useMemo(() => [...EVENTS_BASE, ...customEvents], [customEvents]);

  const months = useMemo(() => [0,1,2].map(offset => {
    const m=(startMonth+offset)%12;
    const y=2026+Math.floor((startMonth+offset)/12);
    const events=allEvents.filter(e=>{const d=parseDate(e.date);return d.getMonth()===m&&d.getFullYear()===y&&(filterCat==="all"||e.categorie===filterCat);});
    return {m,y,days:getDaysInMonth(y,m),blanks:getMondayOffset(y,m),events};
  }),[startMonth,filterCat,allEvents]);

  const timeline = useMemo(()=>{
    const groups={};
    allEvents
      .filter(e=>{const d=parseDate(e.date);return d>=today&&(filterCat==="all"||e.categorie===filterCat);})
      .sort((a,b)=>a.date.localeCompare(b.date))
      .forEach(e=>{if(!groups[e.date])groups[e.date]=[];groups[e.date].push(e);});
    return Object.entries(groups);
  },[filterCat,allEvents]);

  const getDayEvts=(y,m,day,events)=>events.filter(e=>{const d=parseDate(e.date);return d.getDate()===day&&d.getMonth()===m&&d.getFullYear()===y;});

  function handleAdd() {
    if(!form.date){setFormError("La date est obligatoire.");return;}
    if(!form.titre.trim()){setFormError("Le titre est obligatoire.");return;}
    const newEvent = {...form, titre:form.titre.trim(), id:uid()};
    db.ref('customEvents/' + newEvent.id).set(newEvent);
    setForm(EMPTY_FORM);setFormError("");setShowForm(false);
  }

  function handleDelete(id) {
    db.ref('customEvents/' + id).remove();
    setDeleteConfirm(null);setEditingId(null);
  }

  function openEdit(ev) {
    setEditingId(ev.id);
    setEditForm({date:ev.date,categorie:ev.categorie,titre:ev.titre,responsable:ev.responsable||"",horaire:ev.horaire||""});
    setEditError("");
  }

  function handleSaveEdit() {
    if(!editForm.date){setEditError("La date est obligatoire.");return;}
    if(!editForm.titre.trim()){setEditError("Le titre est obligatoire.");return;}
    db.ref('customEvents/' + editingId).update({...editForm, titre:editForm.titre.trim()});
    setEditingId(null);setEditError("");
  }

        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{background:"#C0392B",color:"#fff",padding:"6px 14px",borderRadius:3,fontSize:12,fontWeight:600}}>

          <button onClick={()=>{setShowForm(v=>!v);setFormError("");}} style={btn({background:showForm?"#111":"#fff",color:showForm?"#fff":"#111",border:"2px solid #111",padding:"6px 16px",fontSize:12,fontWeight:700})}>
            {showForm?"✕ Fermer":"+ Ajouter un événement"}

      {/* ══ FORMULAIRE AJOUT ══ */}

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12}}>

            {customEvents.length>0 && <span style={{fontSize:11,color:"#9CA3AF",marginLeft:8}}>✦ {customEvents.length} ajouté{customEvents.length>1?"s":""}</span>}

        </div>

      {/* ══ BARRE CONTRÔLE ══ */}

            <button key={v} onClick={()=>setView(v)} style={btn({borderRadius:0,background:view===v?"#111":"#fff",color:view===v?"#fff":"#555",padding:"7px 16px",fontSize:12,fontWeight:view===v?700:400})}>
              {label}
            </button>
          ))}
        </div>
        {view==="panorama" && (
          <div style={{display:"flex",gap:6,alignItems:"center"}}>

              const MONTH_COLORS_LIST=["#5A9BD5","#4A7FB5","#B5748A","#F2A7BB","#9A7BB6","#C7BA4A","#D4A018","#C1405C","#A0623B","#7B893A","#8A5A80","#A15B20"];

                        🎭 {spectCount} spectacle{spectCount>1?"s":""}

                  </div>

                                    {/* Tous les jours du mois */}
                  <div>
                    <div style={{display:"flex",padding:"5px 14px",borderBottom:"1px solid #F3F4F6",background:"#FAFAFA"}}>

                    </div>
                    {Array(days).fill(null).map((_,i)=>{
                      const day=i+1;
                      const iso=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                      const dow=new Date(y,m,day).getDay();
                      const dowLabel=["Di","Lu","Ma","Me","Je","Ve","Sa"][dow];

                      const isWE=dow===0||dow===6;
                      // Vacances Zone B : détecter si ce jour a un event "ferme" de type vacances
                      const isVacances=allEvents.some(e=>e.date===iso&&e.categorie==="ferme"&&e.titre&&e.titre.includes("Zone B"));
                      // Filtrer les cours non maintenus pendant vacances (Pitchoun mercredi 10h et Pré-ado mercredi 14h)
                      const dayEvtsRaw=allEvents.filter(e=>e.date===iso&&(filterCat==="all"||e.categorie===filterCat));

                        // Supprimer Pitchoun et Pré-ado pendant vacances
                        if(t.includes("Pitchoun")||t.includes("Pré-ado")||t.includes("Pre-ado")) return false;
                        return true;

                      const hasSpec=dayEvts.some(e=>e.categorie==="spectacle");

                          <div style={{minWidth:60,display:"flex",alignItems:"center",gap:5,paddingTop:3,flexShrink:0}}>

                            <span style={{fontSize:10,color:isToday?"#C0392B":"#CBD5E1",fontWeight:600}}>{dowLabel}</span>
                          </div>
                          <div style={{flex:1,display:"flex",flexDirection:"column",gap:2,paddingTop:3}}>

          <div style={{fontSize:10,color:"#9CA3AF",letterSpacing:2,textTransform:"uppercase",marginBottom:24}}>

          </div>
          {timeline.length===0 && <div style={{color:"#9CA3AF",fontStyle:"italic"}}>Aucun événement à venir.</div>}
          {(()=>{
            let lastMonthKey=null;

            timeline.forEach(([dateStr,evts])=>{
              const d=parseDate(dateStr);
              const monthKey=`${d.getFullYear()}-${d.getMonth()}`;
              const isNow=isSameDay(d,today);
              const isPast=d<today;
              const hasSpect=evts.some(e=>e.categorie==="spectacle");
              const jourNom=JOURS_NOM[d.getDay()];
              const monthColor=MONTH_COLORS[d.getMonth()];
              const isCurrentMonth=d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();

              if(monthKey!==lastMonthKey){

                <div key={dateStr} style={{display:"flex",marginBottom:3,opacity:isPast?0.4:1}}>
                  <div style={{width:96,minWidth:96,paddingRight:16,paddingTop:9,textAlign:"right",position:"relative",borderRight:`3px solid ${isNow?"#C0392B":hasSpect?"#C0392B44":"#E5E7EB"}`}}>
                    {isNow && <div style={{position:"absolute",right:-7,top:12,width:11,height:11,borderRadius:"50%",background:"#C0392B",border:"2px solid #fff"}}/>}
                    <div style={{fontSize:21,fontWeight:800,color:isNow?"#C0392B":"#111",lineHeight:1}}>{d.getDate()}</div>
                    <div style={{fontSize:10,color:"#9CA3AF",marginTop:2,letterSpacing:"0.5px"}}>{jourNom} {MOIS_SHORT[d.getMonth()]}</div>
                  </div>
                  <div style={{paddingLeft:16,paddingTop:6,paddingBottom:6,flex:1,display:"flex",flexDirection:"column",gap:4}}>
                    {evts.map((ev,ei)=>{
                      const cat=CAT[ev.categorie]||CAT.cours;
                      const isSpect=ev.categorie==="spectacle";
                      const isCustom=ev.id?.startsWith("u-");
                      return (
                        <div key={ev.id||ei} style={{background:isSpect?"#FEF2F2":"#F9FAFB",border:`1px solid ${isSpect?"#C0392B33":"#E5E7EB"}`,borderLeft:`3px solid ${cat.color}`,borderRadius:4,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                          <div>
                            <div style={{fontSize:13,fontWeight:isSpect?800:500,color:"#111",textTransform:isSpect?"uppercase":"none",letterSpacing:isSpect?"0.4px":"0"}}>{ev.titre}</div>
                            {ev.responsable && <div style={{fontSize:11,color:"#9CA3AF",marginTop:1}}>{ev.responsable}</div>}
                          </div>
                          <div style={{display:"flex",gap:8,alignItems:"center"}}>
                            {ev.horaire&&ev.horaire!=="—" && <span style={{fontSize:11,color:cat.color,fontWeight:700}}>{ev.horaire}</span>}
                            <span style={{fontSize:10,color:cat.color,border:`1px solid ${cat.color}`,padding:"2px 7px",borderRadius:3,textTransform:"uppercase",letterSpacing:"0.5px"}}>{cat.label}</span>
                            {isCustom && (
                              <div style={{display:"flex",gap:4}}>
                                <button onClick={()=>openEdit(ev)} title="Modifier" style={btn({background:"transparent",color:"#9CA3AF",fontSize:15,padding:"2px 5px"})}>✎</button>
                                <button onClick={()=>setDeleteConfirm(ev.id)} title="Supprimer" style={btn({background:"transparent",color:"#D1D5DB",fontSize:14,padding:"2px 6px"})}>✕</button>
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            });
            return items;
          })()}
        </div>
      )}

      {/* ══ MODALE ÉDITION ══ */}
      {editingId && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#fff",borderRadius:8,padding:"28px 32px",width:"100%",maxWidth:520,boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
            <div style={{fontSize:11,letterSpacing:2,color:"#888",textTransform:"uppercase",marginBottom:14}}>Modifier l'événement</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Field label="DATE *">
                <input type="date" value={editForm.date} onChange={e=>setEditForm(f=>({...f,date:e.target.value}))} style={inputStyle}/>
              </Field>
              <Field label="CATÉGORIE *">
                <select value={editForm.categorie} onChange={e=>setEditForm(f=>({...f,categorie:e.target.value}))} style={{...inputStyle,background:"#fff"}}>
                  {Object.entries(CAT).filter(([k])=>k!=="ferme").map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                </select>
              </Field>
              <div style={{gridColumn:"span 2"}}>
                <Field label="TITRE *">
                  <input type="text" value={editForm.titre} onChange={e=>setEditForm(f=>({...f,titre:e.target.value}))} style={inputStyle}/>
                </Field>
              </div>
              <Field label="RESPONSABLE">
                <input type="text" value={editForm.responsable} onChange={e=>setEditForm(f=>({...f,responsable:e.target.value}))} style={inputStyle}/>
              </Field>
              <Field label="HORAIRE">
                <input type="text" value={editForm.horaire} onChange={e=>setEditForm(f=>({...f,horaire:e.target.value}))} style={inputStyle}/>
              </Field>
            </div>
            {editError && <div style={{color:"#C0392B",fontSize:12,marginTop:10}}>⚠ {editError}</div>}
            <div style={{display:"flex",gap:10,marginTop:20,alignItems:"center"}}>
              <button onClick={handleSaveEdit} style={btn({background:"#111",color:"#fff",padding:"9px 22px",fontSize:13,fontWeight:700})}>Enregistrer</button>
              <button onClick={()=>{setEditingId(null);setEditError("");}} style={btn({background:"#fff",border:"1px solid #D1D5DB",color:"#555",padding:"9px 16px",fontSize:13})}>Annuler</button>
              <button onClick={()=>{const id=editingId;setEditingId(null);setDeleteConfirm(id);}} style={btn({background:"transparent",color:"#C0392B",border:"1px solid #C0392B",padding:"9px 16px",fontSize:13,marginLeft:"auto"})}>Supprimer</button>
            </div>
          </div>
        </div>
      )}

      {/* ══ MODALE SUPPRESSION ══ */}
      {deleteConfirm && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#fff",borderRadius:8,padding:"28px 32px",maxWidth:380,textAlign:"center",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Supprimer cet événement ?</div>
            <div style={{fontSize:13,color:"#555",marginBottom:22}}>Cette action est irréversible.</div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>handleDelete(deleteConfirm)} style={btn({background:"#C0392B",color:"#fff",padding:"9px 22px",fontSize:13,fontWeight:700})}>Supprimer</button>
              <button onClick={()=>setDeleteConfirm(null)} style={btn({background:"#fff",border:"1px solid #D1D5DB",color:"#555",padding:"9px 16px",fontSize:13})}>Annuler</button>
            </div>
          </div>
        </div>
      )}

      {/* ══ LÉGENDE ══ */}
      <div style={{padding:"14px 28px",borderTop:"1px solid #E5E7EB",display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",background:"#F9FAFB"}}>
        <span style={{fontSize:10,color:"#9CA3AF",letterSpacing:2,textTransform:"uppercase"}}>Légende</span>
        {Object.entries(CAT).filter(([k])=>k!=="ferme").map(([key,val])=>(
          <div key={key} style={{display:"flex",gap:5,alignItems:"center"}}>
            <div style={{width:9,height:9,borderRadius:2,background:val.color}}/>
            <span style={{fontSize:11,color:"#6B7280"}}>{val.label}</span>
          </div>
        ))}
        {customEvents.length>0 && (
          <span style={{fontSize:10,color:"#9CA3AF",marginLeft:"auto",fontStyle:"italic"}}>
            ✦ {customEvents.length} événement{customEvents.length>1?"s":""} ajouté{customEvents.length>1?"s":""} manuellement
          </span>
        )}
      </div>

    </div>
  );
}

window._mountPlanningDany = function() { if(document.getElementById("planning-root") && !window._planningMountedDany) { window._planningMountedDany=true; ReactDOM.createRoot(document.getElementById("planning-root")).render(<App/>); } };


</script>
</div><!-- fin #app -->
</body>
</html>
